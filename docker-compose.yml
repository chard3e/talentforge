services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: talentforge-neo4j
    ports:
      - "7474:7474"    # Browser arayüzü
      - "7687:7687"    # Bolt portu
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_dbms_security_auth__minimum__password__length=4
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4JLABS_PLUGINS=["apoc", "graph-data-science"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: talentforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge123
      POSTGRES_DB: talentforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: talentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: talentforge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: talentforge
      MINIO_ROOT_PASSWORD: talentforge123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # FastAPI backend 
  # api:
  #   build: .
  #   container_name: talentforge-api
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - neo4j
  #     - postgres
  #     - redis
  #   volumes:
  #     - .:/app
  #   environment:
  #     - ENV=development

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  minio_data: